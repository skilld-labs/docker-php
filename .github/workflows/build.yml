name: Build and Push PHP Images

on:
  workflow_dispatch:

env:
  REGISTRY: skilldlabs/php
  COMPOSER_HASH: "c8b085408188070d5f52bcfe4ecfbee5f727afa458b2573b8eaaf77b3419b0bf2768dc67c86944da1544f06fa544fd47"
  DRUSH_VERSION: "8.5.0"
  PLATFORMS: "linux/amd64,linux/arm64"

jobs:
  build-base:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: ["84", "85"]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: php${{ matrix.tag }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          no-cache: true
          tags: ${{ env.REGISTRY }}:${{ matrix.tag }}
          build-args: |
            COMPOSER_HASH=${{ env.COMPOSER_HASH }}
            DRUSH_VERSION=${{ env.DRUSH_VERSION }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

  build-fpm:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: ["84-fpm", "85-fpm"]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: php${{ matrix.tag }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          no-cache: true
          tags: ${{ env.REGISTRY }}:${{ matrix.tag }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

  build-unit:
    needs: build-base
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag: ["84-unit", "85-unit"]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: php${{ matrix.tag }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          no-cache: true
          tags: ${{ env.REGISTRY }}:${{ matrix.tag }}
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

  build-unit-dev:
    needs: build-unit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ver: ["84", "85"]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: unit-php-builder/dev
          platforms: ${{ env.PLATFORMS }}
          push: true
          no-cache: true
          tags: ${{ env.REGISTRY }}:${{ matrix.ver }}-unit-dev
          build-args: |
            PHPV=${{ matrix.ver }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
