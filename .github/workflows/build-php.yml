name: Build PHP Images (reusable)

on:
  workflow_call:
    inputs:
      php:
        description: "PHP version short code (e.g. 83, 84, 85)"
        required: true
        type: string
      version:
        description: "Version tag (e.g. 8.5.3). Leave empty to skip."
        required: false
        type: string
      platforms:
        description: "Target platforms"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      skip_tests:
        description: "Skip running tests (faster, less safe)"
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  REGISTRY: skilldlabs/php
  COMPOSER_HASH: "c8b085408188070d5f52bcfe4ecfbee5f727afa458b2573b8eaaf77b3419b0bf2768dc67c86944da1544f06fa544fd47"
  DRUSH_VERSION: "8.5.0"

jobs:
  # Setup cache and build all variants in parallel
  # Each job: build test image (amd64) → test → build all platforms → push
  build-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          TAGS="${{ env.REGISTRY }}:${{ inputs.php }}"
          if [ -n "${{ inputs.version }}" ]; then
            TAGS="${TAGS},${{ env.REGISTRY }}:${{ inputs.version }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "base_tag=${{ env.REGISTRY }}:${{ inputs.php }}" >> "$GITHUB_OUTPUT"

      # Restore cache to speed up builds
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-php${{ inputs.php }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-php${{ inputs.php }}-
            ${{ runner.os }}-buildx-

      - name: Build and test base image (amd64 only)
        run: |
          # Build with cache, load for testing
          docker buildx build \
            -t ${{ steps.tags.outputs.base_tag }} \
            --platform linux/amd64 \
            --load \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --build-arg COMPOSER_HASH=${{ env.COMPOSER_HASH }} \
            --build-arg DRUSH_VERSION=${{ env.DRUSH_VERSION }} \
            --build-arg BUILD_DATE=${{ github.event.repository.updated_at }} \
            --build-arg VCS_REF=${{ github.sha }} \
            php${{ inputs.php }}

      - name: Test base image
        if: ${{ !inputs.skip_tests }}
        run: |
          PHPV=$(echo "${{ inputs.php }}" | sed 's/^\(.\)\(.\)$/\1.\2/')
          tests/test-base.sh ${{ steps.tags.outputs.base_tag }} ${PHPV}

      - name: Push base image (all platforms)
        run: |
          docker buildx build \
            -t ${{ steps.tags.outputs.tags }} \
            --platform ${{ inputs.platforms }} \
            --push \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --build-arg COMPOSER_HASH=${{ env.COMPOSER_HASH }} \
            --build-arg DRUSH_VERSION=${{ env.DRUSH_VERSION }} \
            --build-arg BUILD_DATE=${{ github.event.repository.updated_at }} \
            --build-arg VCS_REF=${{ github.sha }} \
            php${{ inputs.php }}

      # This runs in background to move cache after completion
      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

  build-fpm:
    needs: build-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          TAGS="${{ env.REGISTRY }}:${{ inputs.php }}-fpm"
          if [ -n "${{ inputs.version }}" ]; then
            TAGS="${TAGS},${{ env.REGISTRY }}:${{ inputs.php }}-fpm-${{ inputs.version }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "base_tag=${{ env.REGISTRY }}:${{ inputs.php }}-fpm" >> "$GITHUB_OUTPUT"

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-php${{ inputs.php }}-fpm-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-php${{ inputs.php }}-fpm-
            ${{ runner.os }}-buildx-php${{ inputs.php }}-
            ${{ runner.os }}-buildx-

      - name: Build and test FPM image (amd64 only)
        run: |
          docker buildx build \
            -t ${{ steps.tags.outputs.base_tag }} \
            --platform linux/amd64 \
            --load \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --build-arg BUILD_DATE=${{ github.event.repository.updated_at }} \
            --build-arg VCS_REF=${{ github.sha }} \
            php${{ inputs.php }}-fpm

      - name: Test FPM image
        if: ${{ !inputs.skip_tests }}
        run: |
          PHPV=$(echo "${{ inputs.php }}" | sed 's/^\(.\)\(.\)$/\1.\2/')
          tests/test-fpm.sh ${{ steps.tags.outputs.base_tag }} ${PHPV}

      - name: Push FPM image (all platforms)
        run: |
          docker buildx build \
            -t ${{ steps.tags.outputs.tags }} \
            --platform ${{ inputs.platforms }} \
            --push \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --build-arg BUILD_DATE=${{ github.event.repository.updated_at }} \
            --build-arg VCS_REF=${{ github.sha }} \
            php${{ inputs.php }}-fpm

      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

  build-unit:
    needs: build-base
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          TAGS="${{ env.REGISTRY }}:${{ inputs.php }}-unit"
          if [ -n "${{ inputs.version }}" ]; then
            TAGS="${TAGS},${{ env.REGISTRY }}:${{ inputs.php }}-unit-${{ inputs.version }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "base_tag=${{ env.REGISTRY }}:${{ inputs.php }}-unit" >> "$GITHUB_OUTPUT"

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: ${{ env.CACHE_PATH }}
          key: ${{ runner.os }}-buildx-php${{ inputs.php }}-unit-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-php${{ inputs.php }}-unit-
            ${{ runner.os }}-buildx-php${{ inputs.php }}-
            ${{ runner.os }}-buildx-

      - name: Build and test Unit image (amd64 only)
        run: |
          docker buildx build \
            -t ${{ steps.tags.outputs.base_tag }} \
            --platform linux/amd64 \
            --load \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --build-arg BUILD_DATE=${{ github.event.repository.updated_at }} \
            --build-arg VCS_REF=${{ github.sha }} \
            php${{ inputs.php }}-unit

      - name: Test Unit image
        if: ${{ !inputs.skip_tests }}
        run: |
          PHPV=$(echo "${{ inputs.php }}" | sed 's/^\(.\)\(.\)$/\1.\2/')
          tests/test-unit.sh ${{ steps.tags.outputs.base_tag }} ${PHPV}

      - name: Push Unit image (all platforms)
        run: |
          docker buildx build \
            -t ${{ steps.tags.outputs.tags }} \
            --platform ${{ inputs.platforms }} \
            --push \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --build-arg BUILD_DATE=${{ github.event.repository.updated_at }} \
            --build-arg VCS_REF=${{ github.sha }} \
            php${{ inputs.php }}-unit

      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache || true

  build-unit-dev:
    needs: build-unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          echo "tags=${{ env.REGISTRY }}:${{ inputs.php }}-unit-dev" >> "$GITHUB_OUTPUT"

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: ${{ env.CACHE_PATH }}
          key: ${{ runner.os }}-buildx-php${{ inputs.php }}-unit-dev-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-php${{ inputs.php }}-unit-dev-
            ${{ runner.os }}-buildx-php${{ inputs.php }}-
            ${{ runner.os }}-buildx-

      - name: Build and push unit-dev image
        run: |
          docker buildx build \
            -t ${{ steps.tags.outputs.tags }} \
            --platform ${{ inputs.platforms }} \
            --push \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --build-arg PHPV=${{ inputs.php }} \
            --build-arg BUILD_DATE=${{ github.event.repository.updated_at }} \
            --build-arg VCS_REF=${{ github.sha }} \
            unit-php-builder/dev
