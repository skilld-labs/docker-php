name: Build FrankenPHP 8.5

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 8.5.3). Leave empty to skip."
        required: false

jobs:
  build:
    uses: ./.github/workflows/build-frankenphp.yml
    with:
      php: "85"
      version: ${{ inputs.version }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
