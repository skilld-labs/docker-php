name: Build FrankenPHP Images (reusable)

on:
  workflow_call:
    inputs:
      php:
        description: "PHP version short code (e.g. 84, 85)"
        required: true
        type: string
      version:
        description: "Version tag (e.g. 8.5.3). Leave empty to skip."
        required: false
        type: string
      platforms:
        description: "Target platforms"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  REGISTRY: skilldlabs/php
  DRUSH_VERSION: "8.5.0"

jobs:
  build-frankenphp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          TAGS="${{ env.REGISTRY }}:${{ inputs.php }}-frankenphp"
          if [ -n "${{ inputs.version }}" ]; then
            TAGS="${TAGS},${{ env.REGISTRY }}:${{ inputs.php }}-frankenphp-${{ inputs.version }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        with:
          context: php${{ inputs.php }}-frankenphp
          platforms: ${{ inputs.platforms }}
          push: true
          no-cache: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            DRUSH_VERSION=${{ env.DRUSH_VERSION }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}
